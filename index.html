<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#8feee4" />
  <title>はみがき90びょう</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style-v4.css?v=4" />
</head>
<body>
  <main class="app" id="app">
    <img src="kawaii_ui.jpg" class="base-art" alt="はみがき90びょう" draggable="false" />

    <div class="progress-shell" aria-hidden="true"><div id="progress" class="progress-fill"></div><div id="star" class="star">⭐</div></div>
    <div class="timer-pill" id="timer">1:30</div>

    <div class="brush" id="brush" aria-hidden="true">🪥</div>
    <div class="foam" id="foam" aria-hidden="true">🫧</div>
    <div class="sparkles" id="sparkles" aria-hidden="true"></div>

    <div class="germs" aria-hidden="true">
      <span class="germ g1">🦠</span><span class="germ g2">🦠</span><span class="germ g3">🦠</span>
      <span class="germ g4">🦠</span><span class="germ g5">🦠</span><span class="germ g6">🦠</span>
    </div>
    <div class="fairies" aria-hidden="true">
      <span class="fairy f1">🧚‍♀️</span><span class="fairy f2">🧚</span><span class="fairy f3">🧚‍♂️</span><span class="fairy f4">🧚‍♀️</span>
    </div>

    <button class="hit start-hit" id="startBtn" aria-label="スタート"></button>
    <button class="pause-btn" id="pauseBtn">ちょっとおやすみ</button>
    <button class="retry-btn" id="retryBtn">もういっかい</button>

    <section class="done" id="done" aria-live="polite">
      <div class="done-card">
        <div class="done-star">⭐</div>
        <h1>はみがき できた！</h1>
        <p>おくち、ぴかぴか！</p>
        <button id="againBtn">もういっかい</button>
      </div>
    </section>

    <audio id="song" preload="auto" src="hamigaki_song.m4a"></audio>
  </main>
  <div class="rotate">よこ向きにしてね</div>
  <script src="app-v4.js?v=4"></script>
</body>
</html>
