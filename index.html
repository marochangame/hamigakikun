<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#8feee4" />
  <title>はみがきくん</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style-v6-light.css?v=6light" />
</head>
<body>
  <main id="app" class="app" aria-label="はみがきくん">
    <img class="base-art" src="kawaii_ui.jpg" alt="" draggable="false" />

    <div id="movingBrush" class="moving-brush" aria-hidden="true">🪥</div>

    <div class="germ-layer" aria-hidden="true">
      <span class="germ g1">🦠</span>
      <span class="germ g2">🦠</span>
      <span class="germ g3">🦠</span>
      <span class="germ g4">🦠</span>
      <span class="germ g5">🦠</span>
      <span class="germ g6">🦠</span>
      <span class="germ g7">🦠</span>
    </div>

    <div class="fairy-layer" aria-hidden="true">
      <span class="fairy f1">🧚‍♀️</span>
      <span class="fairy f2">🧚</span>
      <span class="fairy f3">🧚‍♂️</span>
      <span class="fairy f4">🧚‍♀️</span>
    </div>

    <div id="sparkles" class="sparkles" aria-hidden="true"></div>

    <button id="startBtn" class="start-btn" type="button">スタート！</button>
    <button id="pauseBtn" class="mini-btn pause-btn" type="button">おやすみ</button>
    <button id="resetBtn" class="mini-btn reset-btn" type="button">↻</button>

    <section id="done" class="done" aria-live="polite">
      <div class="done-card">
        <div class="done-star">⭐</div>
        <h1>はみがき できた！</h1>
        <p>おくち、ぴかぴか！</p>
        <button id="againBtn" type="button">もういっかい</button>
      </div>
    </section>

    <audio id="song" preload="auto" src="hamigaki_song.m4a"></audio>
  </main>
  <div class="rotate">よこ向きにしてね</div>
  <script src="app-v6-light.js?v=6light"></script>
</body>
</html>
