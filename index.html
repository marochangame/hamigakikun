<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#8feee4" />
  <title>はみがき90びょう</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style-v11.css?v=11" />
  <link rel="stylesheet" href="hamigaki_auto_clean.css?v=20260529auto1" />
</head>
<body>
  <main class="app" id="app">
    <div class="stage">
      <img src="kawaii_ui.jpg?v=20260529adopted2" class="base-art" alt="はみがき90びょう" draggable="false" />

      <div class="brush-motion" aria-hidden="true">
        <span class="brush-line bl1"></span>
        <span class="brush-line bl2"></span>
        <span class="brush-line bl3"></span>
        <span class="brush-bubble bb1"></span>
        <span class="brush-bubble bb2"></span>
        <span class="brush-bubble bb3"></span>
      </div>

      <div class="clean-layer" id="cleanLayer" aria-hidden="true">
        <div class="germ-cover g1"><span>✨</span></div>
        <div class="germ-cover g2"><span>✨</span></div>
        <div class="germ-cover g3"><span>✨</span></div>
        <div class="germ-cover g4"><span>✨</span></div>
        <div class="germ-cover g5"><span>✨</span></div>
        <div class="germ-cover g6"><span>✨</span></div>
      </div>

      <div class="sparkle-layer" id="sparkleLayer" aria-hidden="true">
        <span class="sp s1">✦</span><span class="sp s2">✨</span><span class="sp s3">✧</span>
        <span class="sp s4">✦</span><span class="sp s5">✨</span><span class="sp s6">✧</span>
        <span class="sp s7">✦</span><span class="sp s8">✨</span><span class="sp s9">✧</span>
        <span class="sp s10">✦</span><span class="sp s11">✨</span><span class="sp s12">✧</span>
      </div>

      <button class="apple-hit" id="appleBtn" type="button" aria-label="はみがきスタート"></button>
    </div>

    <audio id="song" preload="auto" src="hamigaki_song.m4a?v=20260529voice4"></audio>
  </main>
  <div class="rotate">よこ向きにしてね</div>
  <script src="app-v11.js?v=11"></script>
  <script src="hamigaki_auto_clean.js?v=20260529auto1"></script>
</body>
</html>
