<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#8feee4" />
  <title>はみがき90びょう</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style-v10.css?v=10" />
</head>
<body>
  <main class="app" id="app">
    <img src="kawaii_ui.jpg" class="base-art" alt="はみがき90びょう" draggable="false" />

    <div class="sparkle-layer" id="sparkleLayer" aria-hidden="true">
      <div class="sparkle s1"><span>✦</span><span>✨</span><span>✧</span></div>
      <div class="sparkle s2"><span>✦</span><span>✨</span><span>✧</span></div>
      <div class="sparkle s3"><span>✦</span><span>✨</span><span>✧</span></div>
      <div class="sparkle s4"><span>✦</span><span>✨</span><span>✧</span></div>
      <div class="sparkle s5"><span>✦</span><span>✨</span><span>✧</span></div>
      <div class="sparkle s6"><span>✦</span><span>✨</span><span>✧</span></div>
      <div class="sparkle s7"><span>✦</span><span>✨</span><span>✧</span></div>
    </div>

    <div class="finish" id="finish" aria-live="polite">
      <div class="finish-card">
        <div class="finish-star">⭐</div>
        <div class="finish-main">はみがき できた！</div>
        <div class="finish-sub">もう一回する？</div>
        <button class="again-visible" id="againVisible" type="button">もういっかい</button>
      </div>
    </div>

    <button class="start-hit" id="startBtn" aria-label="スタート"></button>
    <audio id="song" preload="auto" src="hamigaki_song.m4a"></audio>
  </main>
  <div class="rotate">よこ向きにしてね</div>
  <script src="app-v10.js?v=10"></script>
</body>
</html>
