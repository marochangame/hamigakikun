<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#9eeeff" />
  <title>はみがきくん</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style-v7.css?v=7orbit" />
</head>
<body>
  <main id="app" class="app" aria-label="はみがきくん">
    <img class="base-art" src="kawaii_ui.png" alt="かわいい歯みがきの絵" draggable="false" />

    <div id="routeBrush" class="route-brush" aria-hidden="true">
      <div class="brush-handle"></div>
      <div class="brush-neck"></div>
      <div class="brush-head"><i></i><i></i><i></i><i></i><i></i></div>
      <div class="foam"></div>
    </div>

    <div class="clean-germs" aria-hidden="true">
      <span class="clean-germ cg1">🦠</span>
      <span class="clean-germ cg2">🦠</span>
      <span class="clean-germ cg3">🦠</span>
      <span class="clean-germ cg4">🦠</span>
      <span class="clean-germ cg5">🦠</span>
      <span class="clean-germ cg6">🦠</span>
    </div>

    <div id="sparkles" class="sparkles" aria-hidden="true"></div>

    <button id="startBtn" class="start-btn" type="button">スタート！</button>

    <section id="done" class="done" aria-live="polite">
      <div class="done-card">
        <div class="done-star">⭐</div>
        <h1>はみがき できた！</h1>
        <p>おくち、ぴかぴか！</p>
        <button id="againBtn" type="button">もういっかい</button>
      </div>
    </section>

    <audio id="song" preload="auto" src="hamigaki_song.m4a"></audio>
  </main>
  <div class="rotate">よこ向きにしてね</div>
  <script src="app-v7.js?v=7orbit"></script>
</body>
</html>
