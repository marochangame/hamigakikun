<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#8feee4" />
  <title>はみがき90びょう</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style-v9.css?v=9" />
</head>
<body>
  <main class="app" id="app">
    <img src="kawaii_ui.jpg" class="base-art" alt="はみがき90びょう" draggable="false" />

    <div class="clean-layer" id="cleanLayer" aria-hidden="true">
      <div class="clean c1"><span>✦</span><span>✨</span><span>✧</span></div>
      <div class="clean c2"><span>✨</span><span>✦</span><span>✧</span></div>
      <div class="clean c3"><span>✦</span><span>✨</span><span>✧</span></div>
      <div class="clean c4"><span>✨</span><span>✦</span><span>✧</span></div>
      <div class="clean c5"><span>✦</span><span>✨</span><span>✧</span></div>
      <div class="clean c6"><span>✨</span><span>✦</span><span>✧</span></div>
      <div class="clean c7"><span>✦</span><span>✨</span><span>✧</span></div>
    </div>

    <div class="finish" id="finish" aria-live="polite">
      <div class="finish-card">
        <div class="finish-star">⭐</div>
        <div class="finish-main">はみがき できた！</div>
        <div class="finish-sub">おくち、ぴかぴか！</div>
      </div>
    </div>

    <button class="start-hit" id="startBtn" aria-label="スタート"></button>
    <button class="again-hit" id="againBtn" aria-label="もういっかい"></button>

    <audio id="song" preload="auto" src="hamigaki_song.m4a"></audio>
  </main>
  <div class="rotate">よこ向きにしてね</div>
  <script src="app-v9.js?v=9"></script>
</body>
</html>
