<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#8feee4" />
  <title>はみがき90びょう</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style-v11.css?v=16" />
</head>
<body>
  <main class="app" id="app">
    <div class="stage" id="stage">
      <img src="kawaii_ui.png?v=16" class="base-art" alt="" draggable="false" />

      <div class="clean-layer" aria-hidden="true">
        <div class="germ-cover g1"><span>✦</span></div>
        <div class="germ-cover g2"><span>✦</span></div>
        <div class="germ-cover g3"><span>✦</span></div>
        <div class="germ-cover g4"><span>✦</span></div>
        <div class="germ-cover g5"><span>✦</span></div>
        <div class="germ-cover g6"><span>✦</span></div>
      </div>

      <div class="sparkle-layer" aria-hidden="true">
        <i class="sp s1">✦</i><i class="sp s2">✨</i><i class="sp s3">✧</i>
        <i class="sp s4">✦</i><i class="sp s5">✨</i><i class="sp s6">✧</i>
        <i class="sp s7">✦</i><i class="sp s8">✨</i><i class="sp s9">✧</i>
        <i class="sp s10">✦</i><i class="sp s11">✨</i><i class="sp s12">✧</i>
      </div>

      <button class="apple-hit" id="appleBtn" type="button" aria-label="はみがきスタート・ストップ"></button>
      <audio id="song" preload="auto" src="hamigaki_song.m4a?v=16"></audio>
    </div>
  </main>
  <div class="rotate">よこ向きにしてね</div>
  <script src="app-v11.js?v=16"></script>
</body>
</html>
