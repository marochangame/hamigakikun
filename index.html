<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#7bdff2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="はみがき" />
  <title>はみがき90びょう</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app" aria-label="はみがき90びょうアプリ">
    <section class="stage" id="stage">
      <div class="sky-bubbles" aria-hidden="true">
        <span></span><span></span><span></span><span></span><span></span>
      </div>

      <div class="topbar">
        <div class="brand">はみがき 90びょう</div>
        <div class="timer" id="timer">1:30</div>
      </div>

      <div class="progress-wrap" aria-label="進行状況">
        <div class="progress" id="progress"></div>
      </div>

      <div class="content">
        <section class="visual-card" aria-label="アニメーション">
          <div class="mouth" id="mouth">
            <div class="tooth-row upper">
              <i></i><i></i><i></i><i></i><i></i><i></i>
            </div>
            <div class="shine" id="shine">✦</div>
            <div class="brush" id="brush">
              <span class="bristles"></span>
              <span class="handle"></span>
            </div>
            <div class="tooth-row lower">
              <i></i><i></i><i></i><i></i><i></i><i></i>
            </div>
          </div>
          <div class="message" id="message">スタートをおしてね</div>
        </section>

        <section class="guide-card" aria-label="今みがくところ">
          <div class="label">いまみがくところ</div>
          <div class="area-name" id="areaName">じゅんび</div>
          <div class="area-hint" id="areaHint">よこ向きで使ってね</div>
          <div class="mini-map" aria-hidden="true">
            <button class="zone" data-zone="upperOutside">うえ<br>そと</button>
            <button class="zone" data-zone="upperInside">うえ<br>うら</button>
            <button class="zone" data-zone="front">まえ</button>
            <button class="zone" data-zone="lowerOutside">した<br>そと</button>
            <button class="zone" data-zone="lowerInside">した<br>うら</button>
            <button class="zone" data-zone="finish">しあげ</button>
          </div>
        </section>
      </div>

      <div class="controls">
        <button class="primary" id="startBtn">スタート</button>
        <button id="pauseBtn" disabled>一時停止</button>
        <button id="resetBtn">もういっかい</button>
      </div>
    </section>

    <section class="done" id="done" hidden>
      <div class="done-card">
        <div class="medal">🌟</div>
        <h1>はみがき できた！</h1>
        <p>おくち、ぴかぴか！</p>
        <button class="primary" id="againBtn">もういっかい</button>
      </div>
    </section>

    <audio id="song" preload="auto" src="hamigaki_song.m4a"></audio>
  </main>
  <script src="app.js"></script>
</body>
</html>
